name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Get changed files
        id: files
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              ...context.repo,
              pull_number: context.issue.number
            });
            const kotlinFiles = files.filter(f => f.filename.endsWith(".kt"));
            const results = await Promise.all(kotlinFiles.map(async f => {
              const { data: content } = await github.rest.repos.getContent({
                ...context.repo,
                path: f.filename,
                ref: context.payload.pull_request.head.sha
              });
              return {
                filename: f.filename,
                content: Buffer.from(content.content, "base64").toString("utf8")
              };
            }));
            return results;

      - name: AI Review + Comment
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            const files = ${{ steps.files.outputs.result }};
            const comments = [];
            for (const file of files.slice(0, 5)) {
              const prompt = `
                You are a senior Android engineer reviewing a pull request.
                Be specific. DO NOT give generic advice.
                For each issue:
                - Reference exact line number
                - Explain why it's a problem
                - Suggest a concrete fix
                Focus on:
                - Kotlin best practices
                - Jetpack Compose issues
                - Performance problems
                - Readability
                - Bugs
                Return ONLY valid JSON (no markdown, no fences) like:
                [{ "line": 10, "comment": "Explain issue and fix" }]
                If no issues, return [].
                Code:
                ${file.content}
              `.replace(/^ {16}/gm, "").trim();
              let data;
              try {
                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                  method: "POST",
                  headers: {
                    "Authorization": `Bearer ${process.env.OPENAI_API_KEY}`,
                    "content-type": "application/json"
                  },
                  body: JSON.stringify({
                    model: "gpt-4o-mini",
                    messages: [{ role: "user", content: prompt }],
                    temperature: 0.2
                  })
                });
                if (!response.ok) {
                  const err = await response.text();
                  console.error(`API error for ${file.filename}: ${response.status} ${err}`);
                  continue;
                }
                data = await response.json();
              } catch (e) {
                console.error(`Fetch failed for ${file.filename}:`, e.message);
                continue;
              }
              const raw = data?.choices?.[0]?.message?.content ?? "";
              let review;
              try {
                const cleaned = raw.replace(/^```(?:json)?\n?/i, "").replace(/```$/, "").trim();
                review = JSON.parse(cleaned);
                if (!Array.isArray(review)) throw new Error("Not an array");
              } catch (e) {
                console.error(`Invalid JSON for ${file.filename}:`, raw);
                continue;
              }
              for (const item of review) {
                if (typeof item.line !== "number" || !item.comment) continue;
                comments.push({
                  path: file.filename,
                  line: item.line,
                  side: "RIGHT",
                  body: `🤖 ${item.comment}`
                });
              }
            }
            if (comments.length === 0) {
              console.log("No issues found");
              return;
            }
            await github.rest.pulls.createReview({
              ...context.repo,
              pull_number: context.issue.number,
              event: "COMMENT",
              comments
            });
