- name: AI Review + Comment
  uses: actions/github-script@v7
  env:
    OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  with:
    script: |
      const files = ${{ steps.files.outputs.result }};
      const fetch = require("node-fetch");

      const comments = [];

      for (const file of files.slice(0, 5)) {

        const prompt = `
You are a senior Android engineer reviewing a pull request.

Be specific. DO NOT give generic advice.

For each issue:
- Reference exact line number
- Explain why it's a problem
- Suggest a concrete fix

Focus on:
- Kotlin best practices
- Jetpack Compose issues
- Performance problems
- Readability
- Bugs

Return ONLY valid JSON like:
[
  {
    "line": 10,
    "comment": "Explain issue and fix"
  }
]

If no issues, return [].

Code:
${file.content}
        `;

        const response = await fetch("https://api.openai.com/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${process.env.OPENAI_API_KEY}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: "gpt-4o-mini",
            messages: [{ role: "user", content: prompt }],
            temperature: 0.2
          })
        });

        const data = await response.json();

        let review;
        try {
          review = JSON.parse(data.choices[0].message.content);
        } catch (e) {
          console.log("Invalid JSON from AI");
          continue;
        }

        for (const item of review) {
          comments.push({
            path: file.filename,
            line: item.line,
            side: "RIGHT",
            body: `🤖 ${item.comment}`
          });
        }
      }

      if (comments.length === 0) {
        console.log("No issues found");
        return;
      }

      await github.rest.pulls.createReview({
        ...context.repo,
        pull_number: context.issue.number,
        event: "COMMENT",
        comments
      });
