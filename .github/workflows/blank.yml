name: AI PR Review (v2 - Diff based on)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Get PR diff
        id: diff
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              ...context.repo,
              pull_number: context.issue.number
            });

            const filtered = files
              .filter(f =>
                f.filename.endsWith(".kt") ||
                f.filename.endsWith(".java")
              )
              .map(f => ({
                filename: f.filename,
                patch: f.patch || ""
              }))
              .filter(f => f.patch.length > 0);

            return filtered;

      - name: AI Review
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            const fetch = require("node-fetch");

            const files = JSON.parse(`${{ steps.diff.outputs.result }}`);

            let allComments = [];
            let summaryText = [];

            for (const file of files.slice(0, 5)) {

              const prompt = `
You are a strict senior Android engineer reviewing a PR diff.

Review ONLY the changes below.

Rules:
- No generic advice
- Only point real issues
- Be concise but specific

For each issue:
- Give diff line number
- Explain why it's wrong
- Suggest exact fix

Return ONLY JSON:
{
  "comments": [
    { "line": 1, "comment": "..." }
  ],
  "summary": "Short overall review"
}

Diff:
${file.patch}
              `;

              let response;
              try {
                response = await fetch("https://api.openai.com/v1/chat/completions", {
                  method: "POST",
                  headers: {
                    "Authorization": `Bearer ${process.env.OPENAI_API_KEY}`,
                    "Content-Type": "application/json"
                  },
                  body: JSON.stringify({
                    model: "gpt-4o-mini",
                    messages: [{ role: "user", content: prompt }],
                    temperature: 0.2
                  })
                });
              } catch (e) {
                console.log("Fetch error:", e.message);
                continue;
              }

              if (!response.ok) {
                console.log("API error:", await response.text());
                continue;
              }

              const data = await response.json();
              let raw = data?.choices?.[0]?.message?.content ?? "";

              // Clean markdown if any
              raw = raw.replace(/^```json/, "").replace(/```$/, "").trim();

              let parsed;
              try {
                parsed = JSON.parse(raw);
              } catch (e) {
                console.log("Invalid JSON:", raw);
                continue;
              }

              if (parsed.summary) {
                summaryText.push(`### ${file.filename}\n${parsed.summary}`);
              }

              if (!Array.isArray(parsed.comments)) continue;

              // 🔥 CRITICAL: use position instead of line
              let position = 1;

              for (const item of parsed.comments) {
                if (!item.comment) continue;

                allComments.push({
                  path: file.filename,
                  position: position++, // avoids line mismatch issues
                  body: `🤖 ${item.comment}`
                });
              }
            }

            // ✅ Inline comments
            if (allComments.length > 0) {
              await github.rest.pulls.createReview({
                ...context.repo,
                pull_number: context.issue.number,
                event: "COMMENT",
                comments: allComments
              });
            }

            // ✅ PR Summary comment
            if (summaryText.length > 0) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body: `
## 🤖 AI Review Summary

${summaryText.join("\n\n")}
                `
              });
            }
