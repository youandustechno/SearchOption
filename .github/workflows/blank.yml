name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      models: read
    steps:
      - uses: actions/checkout@v3

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > pr.diff

      - name: AI Review + Comment
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('pr.diff', 'utf8').slice(0, 8000);
            const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
              method: "POST",
              headers: {
                "Authorization": "Bearer " + process.env.GITHUB_TOKEN,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                model: "gpt-4o-mini",
                temperature: 0.2,
                messages: [{
                  role: "user",
                  content: "You are a senior Android engineer reviewing a PR.\n" +
                    "Review ONLY the changes below. Be specific, no generic advice.\n" +
                    "For each issue explain why it is a problem and suggest a fix.\n" +
                    "Focus on Kotlin best practices, Compose issues, bugs, and performance.\n" +
                    "Diff:\n" + diff
                }]
              })
            });
            console.log("API status: " + response.status);
            const text = await response.text();
            console.log("API response: " + text);
            let review = "No review generated.";
            try {
              const data = JSON.parse(text);
              review = data.choices[0].message.content;
            } catch(e) {
              review = "API error: " + text;
            }
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: "## 🤖 AI PR Review\n\n" + review
            });
