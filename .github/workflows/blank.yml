- name: AI Review + Comment
  uses: actions/github-script@v7
  env:
    ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  with:
    script: |
      const files = ${{ steps.files.outputs.result }};
      const comments = [];

      for (const file of files.slice(0, 5)) {
        const prompt = `You are a senior Android engineer reviewing a pull request.
Be specific. DO NOT give generic advice.
For each issue:
- Reference exact line number
- Explain why it's a problem
- Suggest a concrete fix
Focus on:
- Kotlin best practices
- Jetpack Compose issues
- Performance problems
- Readability
- Bugs
Return ONLY valid JSON (no markdown, no fences) like:
[{ "line": 10, "comment": "Explain issue and fix" }]
If no issues, return [].
Code:
${file.content}`;

        let data;
        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "x-api-key": process.env.ANTHROPIC_API_KEY,
              "anthropic-version": "2023-06-01",
              "content-type": "application/json"
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1024,
              messages: [{ role: "user", content: prompt }]
            })
          });

          if (!response.ok) {
            const err = await response.text();
            console.error(`API error for ${file.filename}: ${response.status} ${err}`);
            continue;
          }

          data = await response.json();
        } catch (e) {
          console.error(`Fetch failed for ${file.filename}:`, e.message);
          continue;
        }

        const raw = data?.content?.[0]?.text ?? "";

        let review;
        try {
          // Strip markdown fences if the model wraps output anyway
          const cleaned = raw.replace(/^```(?:json)?\n?/i, "").replace(/```$/,"").trim();
          review = JSON.parse(cleaned);
          if (!Array.isArray(review)) throw new Error("Not an array");
        } catch (e) {
          console.error(`Invalid JSON for ${file.filename}:`, raw);
          continue;
        }

        for (const item of review) {
          if (typeof item.line !== "number" || !item.comment) continue;
          comments.push({
            path: file.filename,
            line: item.line,
            side: "RIGHT",
            body: `🤖 ${item.comment}`
          });
        }
      }

      if (comments.length === 0) {
        console.log("No issues found");
        return;
      }

      await github.rest.pulls.createReview({
        ...context.repo,
        pull_number: context.issue.number,
        event: "COMMENT",
        comments
      });
