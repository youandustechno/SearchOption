name: AI PR Review Blank

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Get diff
        id: diff
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              ...context.repo,
              pull_number: context.issue.number
            });
            const kotlinFiles = files.filter(f => f.filename.endsWith(".kt") && f.patch);
            return JSON.stringify(kotlinFiles.map(f => ({
              filename: f.filename,
              patch: f.patch
            })));

      - name: AI Review + Comment
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FILES_JSON: ${{ steps.diff.outputs.result }}
        with:
          script: |
            const rawEnv = process.env.FILES_JSON;
            const files = JSON.parse(rawEnv.startsWith('"') ? JSON.parse(rawEnv) : rawEnv);
            let allComments = [];
            let summaryText = [];
            for (const file of files.slice(0, 5)) {
              const safePatch = file.patch.replace(/\$\{/g, "\\${");
              const prompt = `
                You are a strict senior Android engineer reviewing a PR diff.
                Review ONLY the changes below.
                Rules:
                - No generic advice
                - Only point real issues
                - Be concise but specific
                For each issue:
                - Give diff line number
                - Explain why it's wrong
                - Suggest exact fix
                Return ONLY valid JSON with no markdown or fences:
                {
                  "comments": [{ "line": 1, "comment": "..." }],
                  "summary": "Short overall review"
                }
                Diff:
                ${safePatch}
              `.replace(/^ {16}/gm, "").trim();
              let response;
              try {
                response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                  method: "POST",
                  headers: {
                    "Authorization": `Bearer ${process.env.GITHUB_TOKEN}`,
                    "Content-Type": "application/json"
                  },
                  body: JSON.stringify({
                    model: "gpt-4o-mini",
                    messages: [{ role: "user", content: prompt }],
                    temperature: 0.2
                  })
                });
              } catch (e) {
                console.log("Fetch error:", e.message);
                continue;
              }
              if (!response.ok) {
                console.log("API error:", await response.text());
                continue;
              }
              const data = await response.json();
              let raw = data?.choices?.[0]?.message?.content ?? "";
              raw = raw.replace(/^```json\n?/i, "").replace(/```$/, "").trim();
              let parsed;
              try {
                parsed = JSON.parse(raw);
              } catch (e) {
                console.log("Invalid JSON:", raw);
                continue;
              }
              if (parsed.summary) {
                summaryText.push(`### ${file.filename}\n${parsed.summary}`);
              }
              if (!Array.isArray(parsed.comments)) continue;
              let position = 1;
              for (const item of parsed.comments) {
                if (!item.comment) continue;
                allComments.push({
                  path: file.filename,
                  position: position++,
                  body: `🤖 ${item.comment}`
                });
              }
            }
            if (allComments.length > 0) {
              await github.rest.pulls.createReview({
                ...context.repo,
                pull_number: context.issue.number,
                event: "COMMENT",
                comments: allComments
              });
            }
            if (summaryText.length > 0) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body: `## 🤖 AI Review Summary\n\n${summaryText.join("\n\n")}`
              });
            }
