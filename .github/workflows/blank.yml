name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Get PR files
        uses: actions/github-script@v7
        id: files
        with:
          script: |
            const files = await github.rest.pulls.listFiles({
              ...context.repo,
              pull_number: context.issue.number,
            });
            return files.data.map(f => ({
              filename: f.filename,
              patch: f.patch
            }));

      - name: Create review
        uses: actions/github-script@v7
        with:
          script: |
            const files = ${{ steps.files.outputs.result }};

            const comments = files
              .filter(f => f.patch)
              .slice(0, 3) // limit for demo
              .map(f => ({
                path: f.filename,
                position: 1,
                body: `🤖 Suggestion: Review logic in ${f.filename}. Consider improving readability or splitting functions.`
              }));

            await github.rest.pulls.createReview({
              ...context.repo,
              pull_number: context.issue.number,
              event: "COMMENT",
              comments
            });
