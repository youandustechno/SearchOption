name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: 
      - main_improvement_with_AI_copy_test-1
jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v3

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > pr.diff

      - name: AI Review + Comment
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('pr.diff', 'utf8').slice(0, 8000);
            const response = await fetch("https://api.openai.com/v1/chat/completions", {
              method: "POST",
              headers: {
                "Authorization": "Bearer " + process.env.OPENAI_API_KEY,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                model: "gpt-4o-mini",
                temperature: 0.2,
                messages: [{
                  role: "user",
                  content: "You are a senior Android engineer reviewing a PR.\n" +
                    "Review ONLY the changes below. Be specific, no generic advice.\n" +
                    "For each issue explain why it is a problem and suggest a fix.\n" +
                    "Focus on Kotlin best practices, Compose issues, bugs, and performance.\n" +
                    "Diff:\n" + diff
                }]
              })
            });
            console.log("API status: " + response.status);
            const data = await response.json();
            const review = data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content || "No review generated.";
            console.log("Review: " + review);
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: "## 🤖 AI PR Review\n\n" + review
            });
