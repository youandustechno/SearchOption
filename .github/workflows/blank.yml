name: AI PR Review Blank

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Debug - Test API + List Files
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const { data: allFiles } = await github.rest.pulls.listFiles({
              ...context.repo,
              pull_number: context.issue.number
            });
            console.log("Total files in PR: " + allFiles.length);
            console.log("Kotlin files: " + allFiles.filter(f => f.filename.endsWith(".kt")).length);
            allFiles.forEach(f => console.log(" - " + f.filename + " patch=" + (f.patch ? "yes" : "NO PATCH")));
            const testResponse = await fetch("https://models.inference.ai.azure.com/chat/completions", {
              method: "POST",
              headers: {
                "Authorization": "Bearer " + process.env.GITHUB_TOKEN,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [{ role: "user", content: "Reply with just the word OK" }],
                temperature: 0
              })
            });
            console.log("API status: " + testResponse.status);
            const testData = await testResponse.text();
            console.log("API response: " + testData);

      - name: AI Review + Comment
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const { data: allFiles } = await github.rest.pulls.listFiles({
              ...context.repo,
              pull_number: context.issue.number
            });
            const files = allFiles.filter(f => f.filename.endsWith(".kt") && f.patch);
            console.log("Found " + files.length + " Kotlin files with patches");
            if (files.length === 0) {
              console.log("No Kotlin files to review");
              return;
            }
            let summaryLines = [];
            for (const file of files.slice(0, 5)) {
              const safePatch = file.patch.replace(/\$\{/g, "\\${");
              const prompt = [
                "You are a strict senior Android engineer reviewing a PR diff.",
                "Review ONLY the changes below.",
                "Rules:",
                "- No generic advice",
                "- Only point real issues",
                "- Be concise but specific",
                "For each issue:",
                "- Give diff line number",
                "- Explain why it's wrong",
                "- Suggest exact fix",
                "Return ONLY valid JSON with no markdown or fences:",
                '{ "comments": [{ "line": 1, "comment": "..." }], "summary": "Short overall review" }',
                "Diff:",
                safePatch
              ].join("\n");
              let response;
              try {
                response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                  method: "POST",
                  headers: {
                    "Authorization": "Bearer " + process.env.GITHUB_TOKEN,
                    "Content-Type": "application/json"
                  },
                  body: JSON.stringify({
                    model: "gpt-4o-mini",
                    messages: [{ role: "user", content: prompt }],
                    temperature: 0.2
                  })
                });
              } catch (e) {
                console.log("Fetch error: " + e.message);
                continue;
              }
              console.log("API status for " + file.filename + ": " + response.status);
              if (!response.ok) {
                console.log("API error: " + await response.text());
                continue;
              }
              const data = await response.json();
              let raw = data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content || "";
              console.log("Raw AI response: " + raw);
              raw = raw.replace(/^```json\n?/i, "").replace(/```$/, "").trim();
              let parsed;
              try {
                parsed = JSON.parse(raw);
              } catch (e) {
                console.log("Invalid JSON: " + raw);
                continue;
              }
              let fileSection = "### " + file.filename + "\n";
              if (parsed.summary) {
                fileSection += "**Summary:** " + parsed.summary + "\n\n";
              }
              if (Array.isArray(parsed.comments) && parsed.comments.length > 0) {
                for (const item of parsed.comments) {
                  if (!item.comment) continue;
                  fileSection += "- **Line " + item.line + ":** " + item.comment + "\n";
                }
              } else {
                fileSection += "No issues found.\n";
              }
              summaryLines.push(fileSection);
            }
            if (summaryLines.length === 0) {
              console.log("No summary generated");
              return;
            }
            const body = "## AI PR Review\n\n" + summaryLines.join("\n---\n");
            console.log("Posting comment...");
            try {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body: body
              });
              console.log("Comment posted successfully");
            } catch (e) {
              console.log("Failed to post comment: " + e.message);
            }
